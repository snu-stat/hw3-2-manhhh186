name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]
    
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib polars seaborn plotnine statsmodels pybabynames pylahman patchworklib scipy

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "reticulate",
            "knitr",
            "rmarkdown",
            "dplyr",
            "babynames",
            "tidyverse",
            "NHANES",
            "patchwork",
            "readr",
            "Lahman",
            "ggrepel",
            "mosaic",
            "mosaicData",
            "broom",
            "boot"
          ))
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md
          
      - name: Render Quarto
        run: |
          export RETICULATE_PYTHON=$(which python)
          quarto render
        shell: bash -l {0}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Create ipynb for Binder
        run: |
          export RETICULATE_PYTHON=$(which python)
          quarto render hw03.qmd --to ipynb
        shell: bash -l {0}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-r-env:latest